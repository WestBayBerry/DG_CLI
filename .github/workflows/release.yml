name: Release

# Publishes @westbayberry/dg from the public mirror so npm provenance can
# verify against a public source repo. Stays workflow_dispatch-only until the
# npm Trusted Publisher is repointed from WestBayBerry/WestBayBerry to
# WestBayBerry/DG_CLI + release.yml; switch to a tag trigger after that cutover.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match package.json)
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.2.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -n "$DISPATCH_VERSION" ] && [ "$DISPATCH_VERSION" != "$VERSION" ]; then
            echo "::error::override $DISPATCH_VERSION does not match package.json $VERSION"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Refuse to re-publish an existing version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if npm view "@westbayberry/dg@$VERSION" version >/dev/null 2>&1; then
            echo "::error::@westbayberry/dg@$VERSION already published — bump package.json"
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run check:package
      - run: npm run check:tarball

      - name: Upgrade npm for Trusted Publishing + provenance
        run: npm install -g npm@^11.5.1

      - name: Publish to npm (Trusted Publisher OIDC + provenance)
        run: npm publish --access public --provenance
