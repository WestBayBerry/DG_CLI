name: Feature request
description: Propose a change to the dg CLI
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What you are trying to do and where the CLI falls short.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: What the CLI should do instead, including flags and exit codes if relevant.
    validations:
      required: true
